<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EzyMember Kinetic Text Promo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    :root {
      --primary-accent: #1F9787;
      --primary-light: #DDF3F0;
      --primary-border: #4AB3A6;
      --dark-text: #0B2420;
      --danger: #e53e3e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: #0d1110;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .reel-viewport {
      position: relative;
      width: 380px;
      height: 675px; 
      background-color: var(--primary-light);
      border: 4px solid var(--primary-border);
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .scene {
      position: absolute;
      inset: 0;
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      will-change: transform, opacity;
    }

    /* KINETIC TYPOGRAPHY STYLES */
    .mega-text {
      font-size: 42px;
      font-weight: 900;
      color: var(--dark-text);
      line-height: 1.1;
      text-transform: uppercase;
      letter-spacing: -1px;
    }
    
    .mega-text span {
      color: var(--primary-accent);
    }

    .mega-text .bad {
      color: var(--danger);
    }

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      text-align: left;
    }

    .feature-item {
      font-size: 24px;
      font-weight: 800;
      color: var(--dark-text);
      background: #ffffff;
      padding: 16px 20px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(31, 151, 135, 0.15);
      border-left: 6px solid var(--primary-accent);
      transform: translateX(-50px);
      opacity: 0;
    }

    .feature-item span {
      color: var(--primary-accent);
    }

    .control-bar {
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: #1e293b;
      padding: 12px 24px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 700;
    }

    .btn {
      background: var(--primary-accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .progress-track {
      width: 180px;
      height: 8px;
      background: #334155;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--primary-border);
    }
  </style>
</head>
<body>

  <div class="reel-viewport" id="viewport">

    <!-- [0:00 - 0:10] SCENE 1: THE PAIN -->
    <div class="scene" id="scene1">
      <h1 class="mega-text" id="pain1" style="position: absolute;">Managing members is <br><span class="bad">chaos.</span></h1>
      <h1 class="mega-text" id="pain2" style="position: absolute; opacity: 0;">Messy<br>Spreadsheets.</h1>
      <h1 class="mega-text" id="pain3" style="position: absolute; opacity: 0;">Missing<br>Payments.</h1>
    </div>

    <!-- [0:10 - 0:20] SCENE 2: THE SHIFT -->
    <div class="scene" id="scene2">
      <h1 class="mega-text" id="shift1" style="position: absolute;">What if it took...</h1>
      <h1 class="mega-text" id="shift2" style="position: absolute; opacity: 0; font-size: 64px;"><span>3 CLICKS?</span></h1>
    </div>

    <!-- [0:20 - 0:45] SCENE 3: THE SUPERPOWERS -->
    <div class="scene" id="scene3">
      <div class="feature-list">
        <div class="feature-item" id="f1">1-Click <span>WhatsApp</span> Reminders</div>
        <div class="feature-item" id="f2">Smart <span>Auto-Filters</span></div>
        <div class="feature-item" id="f3">Log Payments <span>Instantly</span></div>
        <div class="feature-item" id="f4" style="border-left-color: #4285F4;">100% Offline + <span>Drive Sync</span></div>
      </div>
    </div>

    <!-- [0:45 - 1:00] SCENE 4: OUTRO -->
    <div class="scene" id="scene4">
      <img src="app_logo_no_bg.png" alt="EzyMember Logo" style="width: 160px; filter: drop-shadow(0 10px 15px rgba(31,151,135,0.2)); margin-bottom: 24px;" id="outro-logo" />
      <h1 class="mega-text" style="font-size: 32px; text-transform: none; margin-bottom: 32px;">Run your business <br><span>from your pocket.</span></h1>
      <div style="background: var(--primary-accent); color: white; padding: 18px 36px; border-radius: 50px; font-weight: 900; font-size: 18px; box-shadow: 0 8px 20px rgba(31,151,135,0.4);" id="outro-btn">
        Download EzyMember
      </div>
    </div>

  </div>

  <div class="control-bar">
    <button class="btn" id="playBtn">Play / Pause</button>
    <button class="btn" id="resetBtn" style="background:#475569;">Reset</button>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span id="timeDisplay">00:00 / 01:00</span>
  </div>

  <script>
    const tl = gsap.timeline({ paused: true, onUpdate: updateProgress });

    // Scene 1: The Pain (0-10s)
    gsap.set("#scene1", { autoAlpha: 1 });
    tl.fromTo("#pain1", { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.8, ease: "back.out(1.5)" }, 0.5)
      .to("#pain1", { scale: 1.2, opacity: 0, duration: 0.5 }, 3)
      
      .fromTo("#pain2", { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "power2.out" }, 3.5)
      .to("#pain2", { scale: 1.2, opacity: 0, duration: 0.5 }, 6)
      
      .fromTo("#pain3", { scale: 0.8, opacity: 0 }, { scale: 1, opacity: 1, duration: 0.5, ease: "power2.out" }, 6.5)
      .to("#scene1", { opacity: 0, duration: 0.5 }, 9.5);

    // Scene 2: The Shift (10-20s)
    tl.set("#scene2", { autoAlpha: 1 }, 10)
      .fromTo("#shift1", { y: 30, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8 }, 10.5)
      .to("#shift1", { y: -30, opacity: 0, duration: 0.5 }, 14)
      
      .fromTo("#shift2", { scale: 0.2, opacity: 0 }, { scale: 1, opacity: 1, duration: 1, ease: "elastic.out(1, 0.5)" }, 14.5)
      .to("#scene2", { opacity: 0, duration: 0.5 }, 19.5);

    // Scene 3: The Superpowers (20-45s)
    tl.set("#scene3", { autoAlpha: 1 }, 20)
      .to("#f1", { x: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 21)
      .to("#f2", { x: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 26)
      .to("#f3", { x: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 31)
      .to("#f4", { x: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 36)
      .to("#scene3", { opacity: 0, y: -50, duration: 0.8 }, 44);

    // Scene 4: Outro (45-60s)
    tl.set("#scene4", { autoAlpha: 1 }, 45)
      .from("#outro-logo", { scale: 0, rotation: 15, duration: 1, ease: "back.out(1.5)" }, 45.5)
      .from("#scene4 .mega-text", { y: 20, opacity: 0, duration: 0.8 }, 46.5)
      .from("#outro-btn", { y: 30, opacity: 0, duration: 0.8, ease: "power2.out" }, 47.5);
    
    tl.set({}, {}, 60);

    // Controls Logic
    const playBtn = document.getElementById("playBtn");
    const resetBtn = document.getElementById("resetBtn");
    const progressFill = document.getElementById("progressFill");
    const timeDisplay = document.getElementById("timeDisplay");

    playBtn.addEventListener("click", () => { tl.isActive() ? tl.pause() : tl.play(); });
    resetBtn.addEventListener("click", () => { tl.restart().pause(); });

    function updateProgress() {
      const maxTime = 60;
      let currentTime = tl.time();
      if (currentTime > maxTime) currentTime = maxTime;
      const progress = (currentTime / maxTime) * 100;
      progressFill.style.width = `${progress}%`;
      timeDisplay.innerText = `00:${Math.floor(currentTime).toString().padStart(2, '0')} / 01:00`;
    }
  </script>
</body>
</html>
